name: 每周指数数据自动更新

on:
  schedule:
    # 每周日 20:00 CST = 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:  # 可手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行数据更新脚本
        run: python .github/scripts/update_data.py

      - name: 提交变更
        run: |
          git config user.name "Weekly Data Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "✅ 数据无变化，跳过提交"
          else
            git commit -m "chore: weekly index data update $(date +%Y-%m-%d)"
            git push
            echo "✅ 已更新并提交 data.json"
          fi
